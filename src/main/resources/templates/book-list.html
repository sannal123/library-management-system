<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Books</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">📚 Library Books</h2>

    <a href="/books/new" class="btn btn-success mb-3">
        + Add Book
    </a>

    <form th:action="@{/books/search}" method="get" class="row g-3 mb-3">

        <div class="col-md-6">
            <input
                    type="text"
                    name="keyword"
                    class="form-control"
                    placeholder="Search by title">
        </div>

        <div class="col-md-2">
            <button class="btn btn-primary">
                Search
            </button>
        </div>

        <div class="col-md-2">
            <a href="/books/list" class="btn btn-secondary">
                Reset
            </a>
        </div>

    </form>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>Price</th>
            <th width="180">Actions</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="book : ${books}">

            <td th:text="${book.id}"></td>
            <td th:text="${book.title}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.price}"></td>

            <td>

                <a th:href="@{/books/edit/{id}(id=${book.id})}"
                   class="btn btn-warning btn-sm">
                    Edit
                </a>

                <a th:href="@{/books/delete/{id}(id=${book.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Delete this book?')">
                    Delete
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
