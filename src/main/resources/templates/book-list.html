<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Library Books</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body class="bg-light">

<!-- ================= NAVBAR ================= -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

    <div class="container">

        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="fas fa-book-open me-2"></i>
            Library Management System
        </a>

        <div class="d-flex gap-2">

            <a class="btn btn-outline-light"
               th:href="@{/}">
                <i class="fas fa-home"></i>
                Dashboard
            </a>

            <a class="btn btn-light"
               th:href="@{/books/new}">
                <i class="fas fa-plus"></i>
                Add Book
            </a>

        </div>

    </div>

</nav>

<!-- ================= CONTENT ================= -->

<div class="container mt-5">

    <div class="card shadow-lg border-0">

        <!-- Card Header -->

        <div class="card-header bg-dark text-white">

            <h3 class="mb-0">

                <i class="fas fa-book"></i>

                Library Books

            </h3>

        </div>

        <!-- Card Body -->

        <div class="card-body">

            <!-- Search -->

            <form class="row g-3 mb-4"
                  th:action="@{/books/search}"
                  method="get">

                <div class="col-md-10">

                    <input
                            type="text"
                            class="form-control"
                            name="keyword"
                            placeholder="Search title or author..."
                            autocomplete="off">

                </div>

                <div class="col-md-2 d-grid">

                    <button class="btn btn-primary">

                        <i class="fas fa-search"></i>

                        Search

                    </button>

                </div>

            </form>

            <!-- Table -->

            <div class="table-responsive">

                <table class="table table-hover table-bordered align-middle">

                    <thead class="table-dark">

                    <tr>

                        <th>ID</th>

                        <th>Title</th>

                        <th>Author</th>

                        <th>Category</th>

                        <th class="text-end">Price</th>

                        <th class="text-center">Quantity</th>

                        <th class="text-center">Status</th>

                        <th class="text-center" width="170">
                            Actions
                        </th>

                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="book : ${books}">

                        <td th:text="${book.id}"></td>

                        <td th:text="${book.title}"></td>

                        <td th:text="${book.author}"></td>

                        <td th:text="${book.category}"></td>

                        <td class="text-end fw-semibold">

                            ₹ <span th:text="${book.price}"></span>

                        </td>

                        <td class="text-center"
                            th:text="${book.quantity}">
                        </td>

                        <td class="text-center">

                            <span
                                    th:if="${book.available}"
                                    class="badge rounded-pill bg-success px-3">

                                Available

                            </span>

                            <span
                                    th:unless="${book.available}"
                                    class="badge rounded-pill bg-danger px-3">

                                Unavailable

                            </span>

                        </td>

                        <td class="text-center">

                            <a
                                    th:href="@{/books/edit/{id}(id=${book.id})}"
                                    class="btn btn-warning btn-sm me-1"
                                    title="Edit">

                                <i class="fas fa-edit"></i>

                            </a>

                            <a
                                    th:href="@{/books/delete/{id}(id=${book.id})}"
                                    class="btn btn-danger btn-sm"
                                    title="Delete"
                                    onclick="return confirm('Are you sure you want to delete this book?')">

                                <i class="fas fa-trash"></i>

                            </a>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

            <!-- Empty Message -->

            <div
                    th:if="${#lists.isEmpty(books)}"
                    class="alert alert-warning text-center mt-3">

                <i class="fas fa-book-open"></i>

                No books available in the library.

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<style>

    body{
        background:#f8f9fa;
    }

    .navbar-brand{
        font-size:1.4rem;
    }

    .card{
        transition:.3s;
        border-radius:15px;
    }

    .card:hover{
        transform:translateY(-3px);
    }

    .table tbody tr:hover{
        background:#f4f6f9;
    }

    .btn{
        border-radius:8px;
    }

    .badge{
        font-size:.85rem;
    }

</style>

</body>

</html>
