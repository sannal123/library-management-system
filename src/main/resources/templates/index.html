<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Library Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="text-center">

        <h1 class="display-4">
            📚 Library Management System
        </h1>

        <p class="text-muted">
            Spring Boot + Thymeleaf + MySQL
        </p>

    </div>
    <div class="row mt-5 text-center">

        <div class="col-md-4">
            <div class="card shadow border-0">
                <div class="card-body">
                    <h5>Total Books</h5>
                    <h2 class="text-primary"
                        th:text="${totalBooks}">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow border-0">
                <div class="card-body">
                    <h5>Available</h5>
                    <h2 class="text-success"
                        th:text="${availableBooks}">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow border-0">
                <div class="card-body">
                    <h5>Unavailable</h5>
                    <h2 class="text-danger"
                        th:text="${unavailableBooks}">0</h2>
                </div>
            </div>
        </div>

    </div>
    <div class="row mt-5">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h3>Add New Book</h3>

                    <p>Add books to your library database.</p>

                    <a th:href="@{/books/new}"
                       class="btn btn-success">
                        Add Book
                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h3>View Books</h3>

                    <p>View, edit and delete books.</p>

                    <a th:href="@{/books/list}"
                       class="btn btn-primary">
                        View Books
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
