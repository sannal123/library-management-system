<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>Add Book</title>
</head>

<body>

<h2>Add New Book</h2>

<form th:action="@{/books/save}" th:object="${book}" method="post">

  <label>Title</label><br>
  <input type="text" th:field="*{title}"/><br><br>

  <label>Author</label><br>
  <input type="text" th:field="*{author}"/><br><br>

  <label>ISBN</label><br>
  <input type="text" th:field="*{isbn}"/><br><br>

  <label>Category</label><br>
  <input type="text" th:field="*{category}"/><br><br>

  <label>Price</label><br>
  <input type="number" step="0.01" th:field="*{price}"/><br><br>

  <label>Quantity</label><br>
  <input type="number" th:field="*{quantity}"/><br><br>

  <button type="submit">
    Save Book
  </button>

</form>

</body>
</html>
